<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Story+Script&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Story+Script&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <header class="head_nav">
        <input type="checkbox" id="check-menu">
        <label for="check-menu"><img src="./../img/bars-solid-full.svg" alt="logo de menu" class="logo_hamburger"></label>
        <nav class="nav_principal">
            <ul class="ul_menu">
                <li class="item_menu"><a class="link_menu" href="./../index.html">Inicio</a></li>
                <li class="item_menu"><a class="link_menu" href="./sobre_mi.html">Sobre Mi</a></li>
                <li class="item_menu"><a class="link_menu" href="./estudios.html">Estudios</a></li>
                <li class="item_menu"><a class="link_menu" href="./experiencia.html">Experiencia</a></li>
                <li class="item_menu"><a class="link_menu" href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="main_div">
            <form action="" method="">
                <fieldset class="personal-info">
                    <legend>Informacion personal </legend>
                    <ul>
                        <li>
                            <label class="label" for="name">Nombre:
                                <input type="text" class="name_in input" id="name"
                                    placeholder="Sebastian Zarate Pinilla">
                            </label>
                        </li>
                        <li>
                            <label class="label" for="phoneNumber">Telefono:
                                <input type="number" class="numer_text input" id="phoneNumber" maxlength="10"
                                    placeholder="323......1">
                            </label>
                        </li>
                        <li>
                            <label class="label" for="">Correo:
                                <input type="text" class="email input" id="email" placeholder="ejemplo@gmail.com">
                            </label>
                        </li>
                    </ul>
                </fieldset>

                <fieldset class="area-contact">
                    <legend>Motivo de contacto</legend>
                    <ul>
                        <li>
                            <label class="label" for="msg">
                                <textarea name="" class="text_area" id="msg"
                                    placeholder="Escribe tu motivo de contacto aqui"></textarea>
                            </label>
                        </li>
                    </ul>
                </fieldset>
                <button class="button-send">Enviar</button>
            </form>
        </section>

        <section class="main_div social-media">
            <div class="card">
                <a href="https://www.facebook.com/sebastian.zarate.1276487/" target="_blank"><img class="img fb"
                        src="./../img/DUiOg0mJTjz.webp" alt="logo de facebook"></a>
            </div>
            <div class="card">
                <a href="https://github.com/szaratep" target="_blank"><img class="img"
                        src="./../img/GitHub_Invertocat_Logo.svg.webp" alt="logo de github"></a>
            </div>
            <div class="card">
                <a href="https://www.instagram.com/sebazarate_11/" target="_blank"><img class="img ig"
                        src="./../img/Instagram_icon.webp" alt="logo de instagram"></a>
            </div>
        </section>
    </main>

    <footer class="footer_copyRigth">
        <div class="copyRigth">
            <h2>Desarollado por:</h2>
            <p>Sebastian Zarate Pinilla</p>
            <p>Todos los derechos reservados. ©</p>
        </div>
    </footer>
</body>

</html>
